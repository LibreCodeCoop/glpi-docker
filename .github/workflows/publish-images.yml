name: Publish GLPI Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      image_prefix: ${{ steps.vars.outputs.image_prefix }}
      version_php: ${{ steps.vars.outputs.version_php }}
      version_glpi: ${{ steps.vars.outputs.version_glpi }}
    steps:
      - uses: actions/checkout@v4

      - id: vars
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          version_php="$(grep '^VERSION_PHP=' .env.example | cut -d '=' -f 2-)"
          version_glpi="$(grep '^VERSION_GLPI=' .env.example | cut -d '=' -f 2-)"

          echo "image_prefix=${{ env.REGISTRY }}/${owner}/glpi" >> "$GITHUB_OUTPUT"
          echo "version_php=${version_php}" >> "$GITHUB_OUTPUT"
          echo "version_glpi=${version_glpi}" >> "$GITHUB_OUTPUT"

  publish-app-and-web:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: app
            context: .docker/app
            file: .docker/app/Dockerfile
            target: app
            image_name: app
          - service: web
            context: .docker/web
            file: .docker/web/Dockerfile
            image_name: web
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.prepare.outputs.image_prefix }}-${{ matrix.image_name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ needs.prepare.outputs.version_glpi }}

      - if: matrix.service == 'app'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          target: ${{ matrix.target }}
          push: true
          provenance: false
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            version_php=${{ needs.prepare.outputs.version_php }}
            version_glpi=${{ needs.prepare.outputs.version_glpi }}

      - if: matrix.service == 'web'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          provenance: false
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}

  publish-cron:
    needs:
      - prepare
      - publish-app-and-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.prepare.outputs.image_prefix }}-cron
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ needs.prepare.outputs.version_glpi }}

      - uses: docker/build-push-action@v6
        with:
          context: .docker/app
          file: .docker/app/Dockerfile
          target: cron
          push: true
          provenance: false
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            version_php=${{ needs.prepare.outputs.version_php }}
            version_glpi=${{ needs.prepare.outputs.version_glpi }}
